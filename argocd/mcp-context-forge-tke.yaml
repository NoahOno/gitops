apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-context-forge-tke
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NoahOno/app-gitops.git
    targetRevision: main
    path: mcp-context-forge/tke/
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
