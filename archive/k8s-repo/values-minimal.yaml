# 关闭不需要的组件
alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

nodeExporter:
  enabled: false

# Prometheus 配置（尽量轻量）
prometheus:
  prometheusSpec:
    retention: 1d
    scrapeInterval: 30s
    evaluationInterval: 30s
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
      limits:
        memory: 500Mi
        cpu: 300m

# Grafana 保留
grafana:
  enabled: true
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 300Mi
      cpu: 200m

# Operator（必须）
prometheusOperator:
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 200Mi
      cpu: 200m
